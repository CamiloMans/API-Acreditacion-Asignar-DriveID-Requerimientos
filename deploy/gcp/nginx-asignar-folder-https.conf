server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 34.24.174.159;

    ssl_certificate /etc/letsencrypt/live/34.24.174.159/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/34.24.174.159/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /asignar-folder {
        proxy_pass http://127.0.0.1:8002/asignar-folder;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location = /api/acreditacion/asignar-folder/health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        return 404;
    }
}
