name: api-acreditacion-asginar-id-folder-a-requerimientos-de-solicitud

services:
  api-acreditacion-asginar-id-folder-a-requerimientos-de-solicitud:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: api-acreditacion-asginar-id-folder-a-requerimientos-de-solicitud:${APP_VERSION:?APP_VERSION is required}
    container_name: api-acreditacion-asginar-id-folder-a-requerimientos-de-solicitud
    restart: unless-stopped
    init: true
    read_only: true
    env_file:
      - ../../.env
    environment:
      ENVIRONMENT: production
      GOOGLE_CLIENT_SECRET_FILE: /app/client_secret.json
      GOOGLE_TOKEN_FILE: /app/token.json
      SUPABASE_KEY: ""
      SUPABASE_KEY_FILE: /run/secrets/supabase-key
      ASIGNAR_FOLDER_API_TOKEN: ""
      ASIGNAR_FOLDER_API_TOKEN_FILE: /run/secrets/asignar-folder-api-token
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - /run/myma/asignar-folder/google-client-secret.json:/app/client_secret.json:ro
      - /run/myma/asignar-folder/google-token.json:/app/token.json
      - /run/myma/asignar-folder/supabase-key:/run/secrets/supabase-key:ro
      - /run/myma/asignar-folder/asignar-folder-api-token:/run/secrets/asignar-folder-api-token:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    cpus: "0.50"
    mem_limit: 512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 40s
